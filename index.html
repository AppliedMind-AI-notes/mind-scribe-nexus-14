<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preconnect to font origins to reduce critical request chain -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Critical CSS for above-the-fold content -->
    <style>
      /* Critical CSS - Prevent FOUC and ensure visible text during font loading */
      :root {
        --background: 240 4% 95%;
        --foreground: 240 5% 10%;
        --primary: 333 71% 50%;
      }
      .dark {
        --background: 240 5% 10%;
        --foreground: 0 0% 98%;
        --primary: 328 85% 70%;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100vh; }
    </style>
    
    <!-- Load Google Fonts asynchronously to prevent render blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" /></noscript>
    
    <title>AppliedMind - AI-Powered Learning</title>
    <meta name="description" content="A modern notes and learning system for researchers, students, and lifelong learners. Combine rich-text notes, code execution, and intelligent study tools." />
    <meta name="author" content="AppliedMind" />

    <meta property="og:title" content="AppliedMind - AI-Powered Learning" />
    <meta property="og:description" content="A modern notes and learning system for researchers, students, and lifelong learners." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@AppliedMind" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
